    h2 {

    /* Scrollbars */
    .scrollbar {

      gap: 12px;
      padding: 15px;
      scroll-snap-type: x mandatory;
    }
    .scrollbar::-webkit-scrollbar {

    }
    .scrollbar::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.3);

    /* Card style */
    .card {
      flex: 0 0 auto;
      width: 240px;
      min-width: 200px;
      background: rgba(255, 255, 255, 0.06);

      padding: 8px;

      box-shadow: 0 6px 20px rgba(0,0,0,0.45);
      scroll-snap-align: center;
      backdrop-filter: blur(8px);
    }
    .card .img-wrap {
      width: 100%;
      height: 180px;
      overflow: hidden;
      border-radius: 8px;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .card .meta {
      padding: 6px 4px 0;
      font-size: 0.9rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* Smart Link Overlay */
    #smartOverlay {

      align-items: center;

    #smartOverlay.show { display: flex; }
    #smartBox {

      height: 70%;

      border-radius: 12px;

  <!-- Banner Ad -->
  <div class="banner-ad">
    <script type="text/javascript">
      atOptions = {

  <!-- Smart Link Overlay -->

  <script>
    /* -------- Database: Just edit arrays below -------- */
    const freeData = [
      {title:"Free 1", img:"free1.jpg", price:"Free"},
      {title:"Free 2", img:"free2.jpg", price:"Free"},
      {title:"Free 3", img:"free3.jpg", price:"Free"}
    ];
    const paidData = [
      {title:"Paid 1", img:"paid1.jpg", price:"$5"},
      {title:"Paid 2", img:"paid2.jpg", price:"$10"},
      {title:"Paid 3", img:"paid3.jpg", price:"$7"}
    ];
    const galleryData = [
      "gallery1.jpg","gallery2.jpg","gallery3.jpg",
      "gallery4.jpg","gallery5.jpg"
    ];

    function renderCards(data, containerId){
      const container = document.getElementById(containerId);
      data.forEach(item=>{
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="img-wrap"><img src="${item.img}" alt="${item.title}"></div>
          <div class="meta"><div>${item.title}</div><div class="price">${item.price}</div></div>
        `;
        container.appendChild(card);
      });
    }

    function renderGallery(data, containerId){
      const container = document.getElementById(containerId);
      data.forEach(src=>{
        const img = document.createElement('img');
        img.src = src;
        container.appendChild(img);
      });
    }

    renderCards(freeData, 'freeSection');
    renderCards(paidData, 'paidSection');
    renderGallery(galleryData, 'gallery');

    /* -------- Smart Link Modal -------- */
    (function smartLink(){
      var overlay = document.getElementById('smartOverlay');
      var iframe = document.getElementById('smartFrame');
      var closeBtn = document.getElementById('closeSmart');
      var smartUrl = 'https://www.profitableratecpm.com/m5mi6ysh?key=9c4ddf0797f28bf610ffd7af70515e3d';

      function showOverlay(){
        iframe.src = smartUrl;
        overlay.classList.add('show');
      }

      window.addEventListener('load', function(){
        var lastShown = localStorage.getItem('smartLastShown');
        var now = Date.now();
        if (!lastShown || now - lastShown > 5*60*1000) {
          setTimeout(function(){
            showOverlay();
            localStorage.setItem('smartLastShown', now);
          }, 1000);
        }
      });

      closeBtn.addEventListener('click', function(){
        overlay.classList.remove('show');
        iframe.src = 'about:blank';
      });

      overlay.addEventListener('click', function(e){
        if(e.target === overlay) closeBtn.click();
      });
      document.addEventListener('keyup', function(e){
        if(e.key === 'Escape') closeBtn.click();
      });
    })();
  </script>
