    :root{
      --neon-pink: #ff00a8;
      --neon-green: #00ffae;
      --text: #ffffff;

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }

    /* Neon animated background (cleaned syntax + fallback) */
    body{
      font-family: 'Poppins', sans-serif;
      color: var(--text);
      background-color: #080015; /* fallback */
      background:
        radial-gradient(800px 500px at 15% 15%, rgba(255,0,168,0.20) 0%, transparent 35%),
        radial-gradient(900px 600px at 85% 85%, rgba(0,255,174,0.18) 0%, transparent 40%),
        linear-gradient(120deg, #0d0012, #080015);
      overflow-x: hidden;
    }
    .bg-anim{
      position: fixed;
      inset: 0;
      pointer-events: none;
      mix-blend-mode: screen;
      opacity: 0.9;
      animation: neonSweep 14s ease-in-out infinite;
      background:
        radial-gradient(600px 420px at 20% 30%, rgba(255,0,168,0.12) 0%, transparent 35%),
        radial-gradient(700px 480px at 70% 75%, rgba(0,255,174,0.12) 0%, transparent 40%);
    }
    @keyframes neonSweep{
      0% { transform: translate3d(0,0,0); }
      50% { transform: translate3d(0,-2%,0); }
      100% { transform: translate3d(0,0,0); }
    }

    .wrap { max-width: var(--maxw); margin: 28px auto; padding: 20px; }

    header{
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 16px;
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--card-radius);
      box-shadow: 0 10px 40px rgba(0,0,0,0.55);

    .brand { display: flex; align-items: center; gap: 14px; }
    .logo{

      box-shadow: 0 10px 30px rgba(255,0,168,0.18), 0 8px 24px rgba(0,255,174,0.12);
    }
    .title{
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 1px;
      font-size: 1.35rem;
      text-shadow: 0 0 14px rgba(255,0,168,0.35), 0 0 12px rgba(0,255,174,0.25);

    .tag { font-size: .9rem; opacity: .75; }

    .banner-ad{
      display: flex; justify-content: center; align-items: center;
      margin: 18px 0 8px;
    }
    .banner-inner{
      width: 468px; max-width: 100%; height: 60px;
      display: flex; align-items: center; justify-content: center;
      background: var(--glass);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px; overflow: hidden;
      box-shadow: 0 8px 28px rgba(0,0,0,0.45);
    }

    section{
      margin: 22px 0 12px;
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: var(--card-radius);
      box-shadow: 0 10px 36px rgba(0,0,0,0.5);
      backdrop-filter: blur(6px);
    }
    section h2{
      margin: 0; padding: 14px 16px;
      font-family: 'Orbitron', sans-serif; font-size: 1.05rem;
      background: linear-gradient(90deg, rgba(255,0,168,0.18), rgba(0,255,174,0.18));
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .scrollbar{
      display: flex; gap: 14px; overflow-x: auto; padding: 14px;
      scroll-snap-type: x mandatory;
    }
    .scrollbar::-webkit-scrollbar { height: 10px; }
    .scrollbar::-webkit-scrollbar-thumb{
      background: linear-gradient(90deg, rgba(255,0,168,0.45), rgba(0,255,174,0.45));
      border-radius: 20px;
    }

    .card{
      flex: 0 0 auto;
      width: clamp(180px, 35vw, 260px);
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 8px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.45);
      scroll-snap-align: center;
      text-decoration: none;
      color: inherit;
    }
    .img-wrap{
      width: 100%;
      aspect-ratio: 13 / 9;
      border-radius: 8px; overflow: hidden; background: #0f0f10;
      display: flex; align-items: center; justify-content: center;
    }
    .card img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .meta{
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 2px 0; font-size: .92rem;
    }
    .price { font-weight: 600; color: #cafff0; }

    .gallery{
      padding: 14px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
    }
    .gallery .gwrap{
      width: 100%;
      aspect-ratio: 4 / 3;
      border-radius: 10px; overflow: hidden; background: #0f0f10;
      box-shadow: 0 6px 18px rgba(0,0,0,0.45);
    }
    .gallery img { width: 100%; height: 100%; object-fit: cover; display: block; }

    footer{
      text-align: center; color: rgba(255,255,255,0.7);
      margin: 16px 0 30px; font-size: .92rem;
    }

    /* Smart link modal */
    #smartOverlay{
      position: fixed; inset: 0; display: none;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,0.78); z-index: 9999; padding: 16px;
    }
    #smartOverlay.show{ display: flex; }
    #smartBox{
      position: relative; width: min(920px, 96vw); height: min(72vh, 780px);
      background: #050507; border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px; overflow: hidden;
      box-shadow: 0 20px 70px rgba(0,0,0,0.65);
    }
    #smartFrame{ width: 100%; height: 100%; border: 0; background: #fff; }
    #shield{
      position: absolute; inset: 0; background: transparent;
      z-index: 5; pointer-events: auto; /* blocks iframe clicks */
    }
    #closeSmart{
      position: absolute; right: 10px; top: 10px; z-index: 10;
      width: 40px; height: 40px; border-radius: 999px; border: 0;
      cursor: pointer; font-weight: 800; font-size: 18px; color: #0b0b0b;
      background: linear-gradient(135deg, var(--neon-green), var(--neon-pink));

    @media (max-width: 640px){

<body>
  <div class="bg-anim" aria-hidden="true"></div>

  <!-- Smart Link Modal -->
  <div id="smartOverlay" role="dialog" aria-modal="true" aria-label="Sponsored content">
    <div id="smartBox" role="document">
      <button id="closeSmart" title="Close">✕</button>
      <div id="shield" aria-hidden="true"></div>
      <!-- sandbox blocks top navigation; iframe is non-interactive due to shield -->
      <iframe id="smartFrame" src="about:blank" sandbox="allow-scripts allow-forms" title="Sponsored"></iframe>
    </div>
  </div>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    /* =====================
       DATA (easy edit)
    ===================== */
    const freeData = [
      { title: "Free 1", img: "images/free1.jpg", price: "Free", link: "freeimage1.html" },
      { title: "Free 2", img: "images/free2.jpg", price: "Free", link: "freeimage2.html" },
      { title: "Free 3", img: "images/free3.jpg", price: "Free", link: "freeimage3.html" }
    ];
    const paidData = [
      { title: "Subhashree", img: "Images/d0c6b107-e1fa-4322-93ff-36ef462b8631.jfif", price: "₹50", link: "Manga/Subhashree.html" },
      { title: "cute girl with her boyfriend", img: "images/cute.jpg", price: "₹50", link: "manga/cute.html" },
      { title: "Premium 3", img: "images/paid3.jpg", price: "₹199", link: "paidimage3.html" }
    ];
    const galleryData = ["images/g1.jpg", "images/g2.jpg", "images/g3.jpg", "images/g4.jpg", "images/g5.jpg"];

    /* Render helpers */
    function cardTemplate(item, clickable){
      return clickable
        ? `<a href="${item.link}" target="_blank" rel="noopener noreferrer" class="card">
             <div class="img-wrap"><img loading="lazy" src="${item.img}" alt="${item.title}"></div>
             <div class="meta"><div>${item.title}</div><div class="price">${item.price}</div></div>
           </a>`
        : `<div class="card">
             <div class="img-wrap"><img loading="lazy" src="${item.img}" alt="${item.title}"></div>
             <div class="meta"><div>${item.title}</div><div class="price">${item.price}</div></div>
           </div>`;
    }
    function renderCards(data, targetId, clickable){
      const el = document.getElementById(targetId);
      el.innerHTML = data.map(item => cardTemplate(item, clickable)).join('');
    }
    function renderGallery(data, targetId){
      const el = document.getElementById(targetId);
      el.innerHTML = data.map(src => `<div class="gwrap"><img loading="lazy" src="${src}" alt=""></div>`).join('');
    }

    renderCards(freeData, 'freeSection', true);
    renderCards(paidData, 'paidSection', true);
    renderGallery(galleryData, 'gallery');

    /* ==========================
       SMART LINK MODAL (SAFE)
       - shows once per 5 minutes
       - sandbox prevents top-nav takeover
       - shield blocks iframe clicks
    =========================== */
    (function(){
      const overlay = document.getElementById('smartOverlay');
      const frame   = document.getElementById('smartFrame');
      const closeBt = document.getElementById('closeSmart');
      const shield  = document.getElementById('shield');
      const SMART_URL = 'https://www.profitableratecpm.com/m5mi6ysh?key=9c4ddf0797f28bf610ffd7af70515e3d';
      const COOLDOWN = 5 * 60 * 1000;

      function show(){
        frame.src = SMART_URL;
        overlay.classList.add('show');
      }
      function hide(){
        overlay.classList.remove('show');
        frame.src = 'about:blank';
      }

      window.addEventListener('load', () => {
        try{
          const last = parseInt(localStorage.getItem('smartLastShown') || '0', 10);
          const now  = Date.now();
          if (!last || now - last > COOLDOWN) {
            setTimeout(() => {
              show();
              localStorage.setItem('smartLastShown', String(now));
            }, 1000);
          }
        }catch(e){
          setTimeout(show, 1000);
        }
      });

      closeBt.addEventListener('click', hide);
      overlay.addEventListener('click', (e) => { if (e.target === overlay) hide(); });
      document.addEventListener('keyup', (e) => { if (e.key === 'Escape') hide(); });

      // Shield swallows interactions so iframe can't be clicked
      const swallow = (e) => { e.preventDefault(); e.stopPropagation(); };
      ['click','mousedown','mouseup','touchstart','touchend','pointerdown','pointerup']
        .forEach(evt => shield.addEventListener(evt, swallow, { passive: false }));
    })();
  </script>
