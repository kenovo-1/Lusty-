<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cute Videos — Paid</title>
  <meta name="description" content="Exclusive paid content of Cute videos. Unlock with password.">
  <meta name="keywords" content="Cute, paid video, exclusive" />
  <meta property="og:title" content="Cute Paid Video" />
  <meta property="og:description" content="Watch the exclusive Cute paid content." />
  <meta property="og:type" content="video.other" />
  <meta property="og:site_name" content="lust.work.gd" />
  <link rel="icon" href="favicon.png" />

  <style>
    :root{
      --accent:#ff1493;
      --bg:#07060a;
      --muted:#cfd8e3;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background: linear-gradient(180deg,#04040a 0%, #0b0014 100%);
      color:#fff;
      min-height:100vh;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    /* FULLSCREEN LOCK OVERLAY */
    #lockOverlay{
      position:fixed; inset:0;
      display:flex; flex-direction:column; gap:12px;
      align-items:center; justify-content:center;
      background: rgba(3,3,7,0.96);
      z-index:9999; padding:24px; text-align:center;
    }
    #lockOverlay h1{margin:0;font-size:1.25rem;color:var(--accent)}
    #status{font-size:0.95rem;color:var(--muted);margin-top:6px}
    #passwordInput{
      width:220px; max-width:80%;
      padding:10px 12px; font-size:1rem; border-radius:8px;
      border: 1px solid rgba(255,255,255,0.06); background:rgba(255,255,255,0.02);
      color:#fff; text-align:center;
    }
    #unlockBtn{
      margin-top:8px; padding:10px 18px; border-radius:8px; border:0;
      background: linear-gradient(90deg,var(--accent), #00f2d6);
      color:#111; font-weight:700; cursor:pointer; font-size:1rem;
    }

    #instaLink{
      display:inline-block; margin-top:12px; color:#fff; text-decoration:none;
      background:linear-gradient(90deg,#833ab4,#fd1d1d); padding:8px 14px; border-radius:8px;
      font-weight:600;
    }

    /* PAGE CONTENT (hidden while locked) */
    #page {
      opacity:1; transition: opacity .18s ease;
      display:flex; flex-direction:column; align-items:center; gap:14px;
      padding:18px 12px; max-width:1200px; margin:0 auto;
    }
    header{ width:100%; max-width:1100px; text-align:left; margin-top:8px; }
    header h2{ margin:0; font-family: 'Orbitron', sans-serif; font-size:1.2rem; color: #ffb6e6; }

    /* responsive video container */
    .video-wrap{
      width:100%;
      max-width:1100px;
      background:rgba(255,255,255,0.02);
      border-radius:12px;
      overflow:hidden;
      box-shadow:0 20px 60px rgba(0,0,0,0.6);
    }
    .video-iframe{
      width:100%;
      height:calc(100vh - 220px);
      max-height:820px;
      border:0;
      display:block;
      background:#000;
    }

    @media (max-width:900px){
      .video-iframe{ height:56vh; }
    }
    @media (max-width:520px){
      .video-iframe{ height:48vh; }
      #passwordInput{ width:180px }
    }

    /* ad container */
    #adContainer{
      width:100%; max-width:1100px; text-align:center; padding:10px 0;
    }

    .shake{ animation:shake .5s; }
    @keyframes shake{ 0%{transform:translateX(0)}25%{transform:translateX(-8px)}50%{transform:translateX(8px)}75%{transform:translateX(-6px)}100%{transform:translateX(0)} }
  </style>
</head>
<body>

  <!-- LOCK OVERLAY -->
  <div id="lockOverlay">
    <h1>Buy this content — admin will give you the password</h1>
    <input id="passwordInput" type="password" placeholder="Enter password" />
    <div>
      <button id="unlockBtn">Unlock</button>
    </div>
    <div id="status">Enter password to unlock.</div>
    <a id="instaLink" href="https://www.instagram.com/buy.me.up.here?igsh=dWoxNjBkajU0dDY=" target="_blank">Instagram</a>
  </div>

  <!-- REAL PAGE -->
  <div id="page" aria-hidden="true" style="display:none;">
    <header>
      <h2>Cute — Paid Videos</h2>
      <div style="color:#cbd6e6;font-size:.92rem;margin-top:6px">Secure paid page — unlocked after password</div>
    </header>

    <!-- Video players -->
    <div class="video-wrap"><iframe class="video-iframe" src="https://drive.google.com/file/d/16Lq59zUOm48lMML5bqpAxT0vx7rum2cy/preview" allowfullscreen></iframe></div>
    <div class="video-wrap"><iframe class="video-iframe" src="https://drive.google.com/file/d/16VusSr8G1K_hRvMWrXkNoCbK6yrDxJQb/preview" allowfullscreen></iframe></div>
    <div class="video-wrap"><iframe class="video-iframe" src="https://drive.google.com/file/d/16TbSaYJZ7Lu_aFesc0KfceHPx599qdir/preview" allowfullscreen></iframe></div>
    <div class="video-wrap"><iframe class="video-iframe" src="https://drive.google.com/file/d/16R-s1cwg_-17dQLUUdcifqmywilcZ1nB/preview" allowfullscreen></iframe></div>
    <div class="video-wrap"><iframe class="video-iframe" src="https://drive.google.com/file/d/16MBLSFJmitM0lobQcfDM8hzkqIdY_iF4/preview" allowfullscreen></iframe></div>

    <!-- Native ad -->
    <div id="adContainer">
      <script type="text/javascript" src="https://www.profitableratecpm.com/55dfe3aaa958ee80c83245b3581a6b03/invoke.js" async></script>
    </div>
  </div>

  <script>
    // Hidden password in binary ("1042")
    const hiddenBinary = "00110001 00110000 00110100 00110010";

    function binaryToText(bin){
      return bin.split(" ").map(b => String.fromCharCode(parseInt(b, 2))).join("");
    }

    const correctPassword = binaryToText(hiddenBinary);

    const lockOverlay = document.getElementById('lockOverlay');
    const page = document.getElementById('page');
    const input = document.getElementById('passwordInput');
    const btn = document.getElementById('unlockBtn');
    const status = document.getElementById('status');

    function unlockUI(){
      lockOverlay.style.display = 'none';
      page.style.display = 'flex';
    }

    btn.addEventListener('click', tryUnlock);
    input.addEventListener('keyup', e => { if(e.key === 'Enter') tryUnlock(); });

    function tryUnlock(){
      const val = (input.value || '').trim();
      if(val === correctPassword){
        unlockUI();
      } else {
        status.textContent = 'Incorrect password — contact admin';
        input.classList.add('shake');
        setTimeout(()=>input.classList.remove('shake'),600);
      }
    }
  </script>
</body>
</html>
